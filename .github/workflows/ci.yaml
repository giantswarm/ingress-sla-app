name: CI

on: push

jobs:
  test-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check if schema is up to date
        run: make gen-schema && git diff --exit-code

      - name: Run chart unit tests
        run: make unit-test
