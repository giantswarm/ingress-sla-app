name: CI

on: push

jobs:
  test-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check if schema is up to date
        run: make gen-schema && git diff --exit-code

      - name: Run chart unit tests
        run: make unit-test
